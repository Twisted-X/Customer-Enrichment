name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Dummy key so enrichment/_config.py doesn't raise at import
          GOOGLE_PLACES_API_KEY: ci_test_key_not_real
          # Allow empty SKU database (xlsx is not committed)
          MIN_EXPECTED_STYLE_CODES: "0"
          ENRICHMENT_TTL_DAYS: "30"
          ENABLE_PRODUCT_CHECK: "false"
        run: pytest --tb=short -q

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check . --select E,F,W --ignore E501,W291,W293
